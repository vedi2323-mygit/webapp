version: '3'
services:
  webpage:
      build: 
        context: .
        dockerfile: dockerfile.dev
      ports:
        - "3000:3000"
      volumes:
        - /app/node_modules
        - .:/app
  tests:
      build:
        context: .
        dockerfile: dockerfile.dev
      volumes:
        - /app/node_modules
        - .:/app
      command:
        ["npm","run","test"]  